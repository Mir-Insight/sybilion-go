components:
    schemas:
        AutoRechargeState:
            properties:
                below_eur_cents:
                    description: When the available balance drops below this many EUR cents, recharge fires.
                    format: int64
                    type: integer
                enabled:
                    type: boolean
                has_stripe_customer:
                    description: Whether a Stripe customer id is stored (required for auto-recharge to run)
                    type: boolean
                meter_cents:
                    format: int64
                    type: integer
                meter_month:
                    description: UTC month start for meter_cents, if any charges recorded this month
                    format: date
                    nullable: true
                    type: string
                monthly_cap_cents:
                    description: EUR cents charged via auto-recharge per UTC calendar month; 0 = no cap
                    format: int64
                    type: integer
                target_eur_cents:
                    description: Target balance to reach after a recharge, in EUR cents.
                    format: int64
                    type: integer
            required:
                - enabled
                - below_eur_cents
                - target_eur_cents
                - monthly_cap_cents
                - meter_cents
                - has_stripe_customer
            type: object
        CatalogListResponse:
            properties:
                items:
                    description: |
                        All regions or categories, sorted by numeric `id` ascending. Each element
                        is an object with at least `id` (integer) plus the fields available for
                        that dimension.
                    items:
                        additionalProperties: true
                        type: object
                    type: array
            required:
                - items
            type: object
        ErrorMessage:
            properties:
                error:
                    description: Human-readable message (e.g. `angler catalog not configured`).
                    type: string
            required:
                - error
            type: object
        EuroTranche:
            properties:
                created_at:
                    format: date-time
                    type: string
                expires_at:
                    format: date-time
                    type: string
                id:
                    format: uuid
                    type: string
                initial_eur_cents:
                    format: int64
                    type: integer
                remaining_eur_cents:
                    format: int64
                    type: integer
                source:
                    description: One of signup_trial, stripe, partner, legacy. Other labels may appear for custom grants.
                    type: string
            required:
                - id
                - source
                - initial_eur_cents
                - remaining_eur_cents
                - expires_at
                - created_at
            type: object
        Filters:
            description: |
                Optional narrowing for forecast and drivers requests. Integer ids must fall in
                **1..9999**.

                **Discovery:** `GET /api/v1/regions` and `GET /api/v1/categories` return the
                available dimension listings so you can choose ids — submitted filter ids are
                not cross-checked against those listings on `POST /forecasts` or `POST /drivers`.
            properties:
                categories:
                    description: Dimension ids; each item must be an integer from **1** through **9999** inclusive.
                    items:
                        maximum: 9999
                        minimum: 1
                        type: integer
                    type: array
                limit:
                    maximum: 10000
                    minimum: 0
                    type: integer
                regions:
                    description: Dimension ids; each item must be an integer from **1** through **9999** inclusive.
                    items:
                        maximum: 9999
                        minimum: 1
                        type: integer
                    type: array
            type: object
        ForecastArtifactMeta:
            properties:
                content_type:
                    type: string
                href:
                    type: string
                name:
                    type: string
                size:
                    format: int64
                    type: integer
            type: object
        ForecastRequestV1:
            description: |
                Body of `POST /api/v1/forecasts`. Provide at least one of **`soft_horizon`** or **`hard_horizon`**
                (see property descriptions). Optional **`filters`**: when present, each
                **`categories[]`** and **`regions[]`** value is an integer **1–9999** inclusive;
                optional **`limit`** is **0–10000**. See component **`Filters`** for the full schema.
            properties:
                backtest:
                    description: When true, run a backtest evaluation alongside the forecast.
                    type: boolean
                filters:
                    allOf:
                        - $ref: '#/components/schemas/Filters'
                    description: |
                        Optional. Each **`categories[]`** and **`regions[]`** entry must be an integer **1–9999**
                        (inclusive). Optional **`limit`** is **0–10000**. Values are not verified against catalog APIs.
                frequency:
                    description: Series cadence. Only "monthly" is currently supported; "daily" and "weekly" are reserved.
                    enum:
                        - monthly
                    type: string
                hard_horizon:
                    description: |
                        Minimum acceptable horizon (months) for the quality step-down ladder. When omitted, the
                        pipeline falls back to a driverless forecast at `soft_horizon` if no quality run succeeds.
                        When still failing at `hard_horizon`, the pipeline emits a driverless forecast at that horizon.
                        At least one of `soft_horizon` or `hard_horizon` must be present. When both are set,
                        `hard_horizon` must be less than or equal to `soft_horizon`. Maximum 12.
                    maximum: 12
                    minimum: 1
                    type: integer
                pipeline_version:
                    description: Pipeline version. Closed set; no aliases or "latest" resolution. Only v1 is supported today.
                    enum:
                        - v1
                    type: string
                recency_factor:
                    format: double
                    maximum: 1
                    minimum: 0
                    type: number
                soft_horizon:
                    description: |
                        Ideal forecast horizon (months). The pipeline tries this first, then steps down by one month
                        until it reaches `hard_horizon` (when set) while seeking a quality forecast. At least one of
                        `soft_horizon` or `hard_horizon` must be present. When both are set, `hard_horizon` must be
                        less than or equal to `soft_horizon`. Maximum 12.
                    maximum: 12
                    minimum: 1
                    type: integer
                strictly_positive:
                    default: false
                    description: |
                        When true, every value in `timeseries` must be `>= 0` (zero is
                        allowed); a single negative observation rejects the request
                        with 422. The downstream forecasting pipeline (PPL) also clamps
                        the produced forecast at zero so no output point can be
                        negative. Defaults to false, in which case no positivity
                        constraint is applied to inputs or outputs and negative values
                        are returned unchanged. Optional.
                    type: boolean
                timeseries:
                    additionalProperties:
                        type: number
                    description: Map of YYYY-MM-DD date keys to numeric observation values. Must contain at least 60 points (5 years of monthly history) and be aligned to the declared frequency.
                    type: object
                timeseries_metadata:
                    $ref: '#/components/schemas/TimeseriesMetadata'
            required:
                - pipeline_version
                - frequency
                - recency_factor
                - timeseries_metadata
                - timeseries
            type: object
        JobSummary:
            description: Lightweight projection of an async_jobs row (no payload, no manifest).
            properties:
                created_at:
                    format: date-time
                    type: string
                eur_cents_final:
                    description: Final settled charge for the job, in EUR cents. Null until settled.
                    format: int64
                    nullable: true
                    type: integer
                job_id:
                    format: uuid
                    type: string
                pipeline_type:
                    description: Today only "forecast"; future pipeline types will appear here.
                    type: string
                run_id:
                    description: Internal run id (omitted for jobs that haven't started yet).
                    type: string
                settled:
                    description: True iff the job has reached a terminal state and been billed.
                    type: boolean
                settled_at:
                    format: date-time
                    nullable: true
                    type: string
                status:
                    enum:
                        - queued
                        - running
                        - completed
                        - failed
                        - canceled
                    type: string
                terminal_reason:
                    nullable: true
                    type: string
                workflow_id:
                    description: Internal workflow id (omitted for jobs that haven't started yet).
                    type: string
            required:
                - job_id
                - pipeline_type
                - status
                - created_at
                - settled
            type: object
        JobsPagination:
            properties:
                limit:
                    maximum: 200
                    minimum: 1
                    type: integer
                order:
                    enum:
                        - asc
                        - desc
                    type: string
                page:
                    minimum: 1
                    type: integer
                sort:
                    enum:
                        - id
                        - created_at
                        - settled_at
                        - eur_cents_final
                    type: string
                total:
                    format: int64
                    minimum: 0
                    type: integer
                total_pages:
                    format: int64
                    minimum: 0
                    type: integer
            required:
                - page
                - limit
                - total
                - total_pages
                - sort
                - order
            type: object
        MeResponse:
            description: |
                Authenticated user snapshot. All monetary fields are integer EUR cents
                (1 EUR = 100 cents).
            properties:
                api_usage_tier:
                    type: integer
                auto_recharge:
                    $ref: '#/components/schemas/AutoRechargeState'
                available_eur_cents:
                    description: balance_eur_cents minus active holds for in-flight async jobs.
                    format: int64
                    type: integer
                balance_eur_cents:
                    description: Ledger sum exposed as EUR cents.
                    format: int64
                    type: integer
                euro_tranches:
                    description: Active grants (non-empty, unexpired). Consumed in expires_at ascending order.
                    items:
                        $ref: '#/components/schemas/EuroTranche'
                    type: array
                has_ever_paid:
                    type: boolean
                lifetime_paid_cents:
                    format: int64
                    type: integer
                payment_count:
                    type: integer
                signup_trial:
                    description: Present when a signup (free) trial tranche was granted. Omitted for users with no trial or before grant.
                    nullable: true
                    properties:
                        expires_at:
                            description: Omitted if the grant row is missing (abnormal)
                            format: date-time
                            type: string
                        granted_at:
                            format: date-time
                            type: string
                        initial_eur_cents:
                            format: int64
                            type: integer
                        remaining_eur_cents:
                            format: int64
                            type: integer
                    type: object
                user_id:
                    format: uuid
                    type: string
            required:
                - user_id
                - balance_eur_cents
                - available_eur_cents
                - api_usage_tier
                - lifetime_paid_cents
                - payment_count
                - has_ever_paid
                - euro_tranches
            type: object
        Pagination:
            properties:
                limit:
                    description: Page size echoed back from the request.
                    maximum: 200
                    minimum: 1
                    type: integer
                order:
                    description: Sort direction.
                    enum:
                        - asc
                        - desc
                    type: string
                page:
                    description: 1-indexed current page number echoed back from the request.
                    minimum: 1
                    type: integer
                sort:
                    description: Column the rows are sorted by.
                    enum:
                        - id
                        - created_at
                        - eur_cents_charged
                        - credits_charged
                        - units
                    type: string
                total:
                    description: Total matching rows for the authenticated user (full set, not just this page).
                    format: int64
                    minimum: 0
                    type: integer
                total_pages:
                    description: ceil(total / limit). Zero when total is zero.
                    format: int64
                    minimum: 0
                    type: integer
            required:
                - page
                - limit
                - total
                - total_pages
                - sort
                - order
            type: object
        RecommendRequestV1:
            description: |
                Body of `POST /api/v1/drivers`. Mirrors the upstream Recommend service
                contract. Note that the version field is named `version` (not
                `pipeline_version` as on `/forecasts`).

                Required fields: `version`, `recency_factor`, `timeseries_metadata`.
                Both `filters` and `timeseries` are optional on the recommend
                endpoint — when omitted, the handler drops them from the upstream
                payload entirely (no `null` is sent).

                When `filters` is present, **`categories[]`** and **`regions[]`** follow the same rules as
                `POST /api/v1/forecasts`: each integer must be **1–9999** inclusive; optional **`limit`** is **0–10000**.
                See schema **`Filters`** for the canonical shape.
            properties:
                filters:
                    allOf:
                        - $ref: '#/components/schemas/Filters'
                    description: |
                        Optional. Same validation as **`POST /api/v1/forecasts`**: each **`categories[]`** and
                        **`regions[]`** entry is an integer **1–9999** (inclusive); optional **`limit`** is **0–10000**.
                        Values are not verified against catalog APIs.
                recency_factor:
                    format: double
                    maximum: 1
                    minimum: 0
                    type: number
                timeseries:
                    additionalProperties:
                        type: number
                    description: |
                        Optional. Map of YYYY-MM-DD date keys to numeric observation values.
                        When supplied, all keys must parse as YYYY-MM-DD and all values must
                        be finite. Unlike `/forecasts`, this endpoint is frequency-agnostic
                        — there is no monthly alignment, gap detection, or 60-point minimum.
                        When omitted, the handler does not forward the field to the upstream
                        Recommend service at all.
                    type: object
                timeseries_metadata:
                    $ref: '#/components/schemas/TimeseriesMetadata'
                version:
                    description: |
                        Recommend pipeline version. Closed set; only v1 is supported today.
                        Used **locally** to select the per-version validator and is **not
                        forwarded** to the upstream Recommend service.
                    enum:
                        - v1
                    type: string
            required:
                - version
                - recency_factor
                - timeseries_metadata
            type: object
        TimeseriesMetadata:
            properties:
                description:
                    maxLength: 2048
                    type: string
                keywords:
                    items:
                        maxLength: 255
                        minLength: 1
                        type: string
                    maxItems: 20
                    type: array
                title:
                    maxLength: 511
                    minLength: 20
                    type: string
            required:
                - title
            type: object
        UsageEvent:
            properties:
                async_job_id:
                    description: async_jobs.id (UUID) for async pipeline charges; null for sync endpoint charges
                    format: uuid
                    nullable: true
                    type: string
                created_at:
                    description: Timestamp (ISO-8601 text from the database)
                    type: string
                credits_charged:
                    description: Whole credits debited for this usage row before EUR conversion (`eur_cents_charged`).
                    format: int64
                    type: integer
                endpoint:
                    description: Billing endpoint key (e.g. forecast pipeline type or sync route key)
                    type: string
                eur_cents_charged:
                    description: EUR cents debited for this usage row (1 EUR = 100 cents).
                    format: int64
                    type: integer
                id:
                    format: int64
                    type: integer
                units:
                    description: Strategy-defined metering quantity (e.g. tokens, seconds); not necessarily equal to credits.
                    format: int64
                    type: integer
            required:
                - id
                - units
                - credits_charged
                - eur_cents_charged
                - created_at
            type: object
        ValidationErrorResponse:
            properties:
                details:
                    items:
                        properties:
                            field:
                                type: string
                            message:
                                type: string
                        required:
                            - field
                            - message
                        type: object
                    type: array
                error:
                    enum:
                        - validation_failed
                    type: string
            required:
                - error
                - details
            type: object
    securitySchemes:
        bearerAuth:
            scheme: bearer
            type: http
info:
    description: |
        The Sybilion API powers the Sybilion Developers Portal: forecasts, drivers, catalog, account
        and usage. Authenticate every request with `Authorization: Bearer <token>` using either an
        API key created in the Developers Portal or an Auth0 access token from your dashboard session.
    title: Sybilion API
    version: 0.1.0
openapi: 3.0.3
paths:
    /api/v1/categories:
        get:
            description: |
                Same contract as `/api/v1/regions`, but for **categories**. Full listing,
                no pagination. **Discovery only** — not enforced on forecast or drivers submit.
            responses:
                "200":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/CatalogListResponse'
                    description: OK
                "401":
                    description: Unauthorized
                "502":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/ErrorMessage'
                    description: Dimensions backend error or unreachable
                "503":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/ErrorMessage'
                    description: Dimensions backend not enabled for this account
            security:
                - bearerAuth: []
            summary: List categories
    /api/v1/drivers:
        post:
            description: |
                Validates the request with the per-version recommend validator and proxies
                it to the upstream Recommend service. The response from the upstream is
                passed through verbatim (status code, body, content type), so any 4xx
                validation error from the upstream is visible to the caller.

                This is a synchronous billed endpoint: charged only on a successful
                upstream response. Cost scales with the number of items returned plus a
                fixed base fee.

                - 402 if the user's available credit balance is below the per-call base
                  fee (`base` field of the `drivers` pricing spec). The handler does
                  not run and no upstream call is made. (Note: the user-facing balance
                  on `GET /api/v1/me` is exposed as `available_eur_cents`; pricing and
                  the 402 pre-check are evaluated internally in credits.)
                - On any 2xx, the charge is `rate * len(data.drivers[]) + base`,
                  where `data.drivers[]` is the array nested inside the upstream
                  Recommend service's envelope
                  (`{"status":..,"message":..,"data":{"drivers":[...]}}`). Example
                  spec: `{"drivers":{"type":"per_unit","metric":"drivers_items_returned","rate":1,"base":1}}`
                  (one credit per returned driver, plus a one-credit base fee). To
                  collapse pricing to a flat fee swap the entry for
                  `{"drivers":{"type":"flat_fee","credits":1}}`.
                - On any non-2xx (validation 422, upstream 5xx, transport 502), no charge is recorded.
                - Retries with the same `X-Request-ID` are idempotent on the ledger.

                Returns 503 when `RECOMMEND_API_KEY` is not configured.
            requestBody:
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/RecommendRequestV1'
                required: true
            responses:
                "200":
                    description: Ranked candidates from the upstream Recommend service (body and content type passed through).
                "400":
                    description: Malformed JSON body
                "402":
                    description: Insufficient credits (handler did not run, no upstream call was made)
                "413":
                    description: Request body exceeds RECOMMEND_MAX_BODY_BYTES
                "422":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/ValidationErrorResponse'
                    description: Payload failed validation
                "429":
                    description: Rate limited (per-user pipeline bucket)
                "502":
                    description: Upstream Recommend service transport error
                "503":
                    description: Recommend service not configured (RECOMMEND_API_KEY empty)
            security:
                - bearerAuth: []
            summary: Recommend ranked driver-dataset candidates (synchronous proxy)
    /api/v1/forecasts:
        post:
            description: |
                Request body is `ForecastRequestV1`. Optional top-level `filters`, when present,
                may include `categories` and `regions` arrays: **each integer must be between 1 and 9999**
                (inclusive). The API does not verify ids against a catalog. Optional `limit` is
                an integer from **0** to **10000**. See schema `Filters` for the full shape.
            requestBody:
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/ForecastRequestV1'
                required: true
            responses:
                "202":
                    content:
                        application/json:
                            schema:
                                properties:
                                    job_id:
                                        format: uuid
                                        type: string
                                    poll_url:
                                        type: string
                                    run_id:
                                        type: string
                                    workflow:
                                        type: string
                                type: object
                    description: Accepted
                "400":
                    description: Malformed JSON body
                "422":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/ValidationErrorResponse'
                    description: Payload failed validation
                "503":
                    description: Forecast backend not configured
            security:
                - bearerAuth: []
            summary: Start async forecast job
    /api/v1/forecasts/{id}:
        get:
            parameters:
                - in: path
                  name: id
                  required: true
                  schema:
                    format: uuid
                    type: string
            responses:
                "200":
                    content:
                        application/json:
                            schema:
                                properties:
                                    artifacts:
                                        items:
                                            $ref: '#/components/schemas/ForecastArtifactMeta'
                                        type: array
                                    job_id:
                                        type: string
                                    pipeline_error:
                                        additionalProperties: true
                                        description: |
                                            Present for some settled failed or canceled jobs when the pipeline
                                            wrote `error.json` under `forecasts/{id}/` or `forecasts/{id}/output/`
                                            in the artifact bucket. Shape is defined by the pipeline; omitted
                                            when missing or unreadable (bodies larger than 64 KiB are omitted).
                                            May be a JSON object or array depending on the pipeline.
                                        nullable: true
                                        type: object
                                    settled:
                                        type: boolean
                                    status:
                                        enum:
                                            - queued
                                            - running
                                            - completed
                                            - failed
                                            - canceled
                                        type: string
                                type: object
                    description: OK
                "404":
                    description: Forecast job not found, not owned by caller, or tombstoned by the retention job
            security:
                - bearerAuth: []
            summary: Poll forecast job status and artifact metadata (downloads via artifacts sub-path)
    /api/v1/forecasts/{id}/artifacts/{name}:
        get:
            parameters:
                - in: path
                  name: id
                  required: true
                  schema:
                    format: uuid
                    type: string
                - in: path
                  name: name
                  required: true
                  schema:
                    type: string
            responses:
                "200":
                    content:
                        application/octet-stream:
                            schema:
                                format: binary
                                type: string
                    description: Binary body
                "206":
                    description: Partial content (Range)
                "404":
                    description: Forecast job/artifact not found, not owned by caller, or tombstoned by the retention job
            security:
                - bearerAuth: []
            summary: Stream a single output file (proxied from internal artifact store; no gs:// URLs)
    /api/v1/jobs:
        get:
            description: |
                Returns the authenticated user's `async_jobs` as a paginated list. Heavy fields
                (`payload`, `artifact_manifest`) are intentionally omitted; fetch full per-job
                state via `GET /api/v1/forecasts/{id}` (only forecast jobs are supported today).

                Only rows that have not been tombstoned by the retention job are returned.
                A tombstoned job (`deleted_at IS NOT NULL`) is excluded here and returns 404
                on the detail endpoint — run `cmd/retention` (see `FORECAST_RETENTION_MAX_AGE`) to
                lifecycle-manage settled jobs.
            parameters:
                - in: query
                  name: page
                  required: false
                  schema:
                    default: 1
                    minimum: 1
                    type: integer
                - description: Page size. Capped at 200.
                  in: query
                  name: limit
                  required: false
                  schema:
                    default: 50
                    maximum: 200
                    minimum: 1
                    type: integer
                - in: query
                  name: sort
                  required: false
                  schema:
                    default: created_at
                    enum:
                        - id
                        - created_at
                        - settled_at
                        - eur_cents_final
                    type: string
                - in: query
                  name: order
                  required: false
                  schema:
                    default: desc
                    enum:
                        - asc
                        - desc
                    type: string
                - description: Optional status filter.
                  in: query
                  name: status
                  required: false
                  schema:
                    enum:
                        - queued
                        - running
                        - completed
                        - failed
                        - canceled
                    type: string
                - description: Optional pipeline type filter (today only "forecast" is emitted).
                  in: query
                  name: pipeline_type
                  required: false
                  schema:
                    maxLength: 64
                    pattern: ^[a-z0-9_-]+$
                    type: string
            responses:
                "200":
                    content:
                        application/json:
                            schema:
                                properties:
                                    jobs:
                                        items:
                                            $ref: '#/components/schemas/JobSummary'
                                        type: array
                                    pagination:
                                        $ref: '#/components/schemas/JobsPagination'
                                required:
                                    - jobs
                                    - pagination
                                type: object
                    description: OK
                "400":
                    description: Invalid query parameter
                "401":
                    description: Unauthorized
                "429":
                    description: Rate limited (poll bucket)
            security:
                - bearerAuth: []
            summary: Paginated list of the caller's async jobs
    /api/v1/me:
        get:
            responses:
                "200":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/MeResponse'
                    description: OK
            security:
                - bearerAuth: []
            summary: Current user, balances, and usage tier
    /api/v1/regions:
        get:
            description: |
                Returns the full **regions** dimension as JSON with an `items` array. Each item
                includes a numeric `id` plus the fields available for that region.

                **Discovery only:** the API does **not** validate `filters.regions` on
                `POST /api/v1/forecasts` or `POST /api/v1/drivers` against this listing — those
                endpoints keep their existing integer rules (see the `Filters` schema). Use this
                listing to pick valid identifiers for your own integration.

                Requires the same `Authorization: Bearer` as other `/api/v1` routes. Returns
                **503** when the dimensions backend is not enabled for your account.
            responses:
                "200":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/CatalogListResponse'
                    description: OK
                "401":
                    description: Unauthorized
                "502":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/ErrorMessage'
                    description: Dimensions backend error or unreachable
                "503":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/ErrorMessage'
                    description: Dimensions backend not enabled for this account
            security:
                - bearerAuth: []
            summary: List regions
    /api/v1/usage:
        get:
            description: |
                Paginated `usage_events` for the authenticated user. Each row is one billing
                charge (async job completion or a synchronous billed call). When present,
                `endpoint` records the API endpoint that produced the charge.

                Pagination is page-based; callers control the sort column and direction via the
                `sort` and `order` query parameters.
            parameters:
                - description: 1-indexed page number.
                  in: query
                  name: page
                  required: false
                  schema:
                    default: 1
                    minimum: 1
                    type: integer
                - description: Page size. Capped at 200.
                  in: query
                  name: limit
                  required: false
                  schema:
                    default: 50
                    maximum: 200
                    minimum: 1
                    type: integer
                - description: Column to sort by.
                  in: query
                  name: sort
                  required: false
                  schema:
                    default: id
                    enum:
                        - id
                        - created_at
                        - eur_cents_charged
                        - credits_charged
                        - units
                    type: string
                - description: Sort direction.
                  in: query
                  name: order
                  required: false
                  schema:
                    default: desc
                    enum:
                        - asc
                        - desc
                    type: string
            responses:
                "200":
                    content:
                        application/json:
                            schema:
                                properties:
                                    pagination:
                                        $ref: '#/components/schemas/Pagination'
                                    usage_events:
                                        items:
                                            $ref: '#/components/schemas/UsageEvent'
                                        type: array
                                required:
                                    - usage_events
                                    - pagination
                                type: object
                    description: OK
                "400":
                    description: Invalid query parameter (bad page/limit/sort/order)
                "401":
                    description: Unauthorized
            security:
                - bearerAuth: []
            summary: Paginated usage (charged tasks)
    /health:
        get:
            responses:
                "200":
                    content:
                        application/json:
                            schema:
                                type: object
                    description: All components healthy (no component in `error`)
                "503":
                    content:
                        application/json:
                            schema:
                                type: object
                    description: Degraded — at least one component is in `error`
            summary: Health check
servers:
    - url: /
