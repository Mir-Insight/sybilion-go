    ForecastRequestV1:
      example:
        pipeline_version: v1
        backtest: true
        horizon: 1
        timeseries:
          key: 2.3021358869347655
        recency_factor: 0.6027456183070403
        timeseries_metadata:
          keywords:
          - keywords
          - keywords
          - keywords
          - keywords
          - keywords
          description: description
          title: title
        strictly_positive: false
        filters:
          regions:
          - 5961
          - 5961
          limit: 563
          categories:
          - 1466
          - 1466
        frequency: monthly
      properties:
        pipeline_version:
          description: Pipeline version. Closed set; no aliases or "latest" resolution.
            Only v1 is supported today.
          enum:
          - v1
          type: string
        horizon:
          description: Number of forecast steps to produce.
          maximum: 12
          minimum: 1
          type: integer
        frequency:
          description: Series cadence. Only "monthly" is currently supported; "daily"
            and "weekly" are reserved.
          enum:
          - monthly
          type: string
        backtest:
          description: "When true, run a backtest evaluation alongside the forecast."
          type: boolean
        recency_factor:
          format: double
          maximum: 1.0
          minimum: 0.0
          type: number
        strictly_positive:
          default: false
          description: |
            When true, every value in `timeseries` must be `>= 0` (zero is
            allowed); a single negative observation rejects the request
            with 422. The downstream forecasting pipeline (PPL) also clamps
            the produced forecast at zero so no output point can be
            negative. Defaults to false, in which case no positivity
            constraint is applied to inputs or outputs and negative values
            are returned unchanged. Optional.
          type: boolean
        timeseries_metadata:
          $ref: '#/components/schemas/TimeseriesMetadata'
        filters:
          $ref: '#/components/schemas/Filters'
        timeseries:
          additionalProperties:
            type: number
          description: Map of YYYY-MM-DD date keys to numeric observation values.
            Must contain at least 60 points (5 years of monthly history) and be aligned
            to the declared frequency.
          type: object
      required:
      - frequency
      - horizon
      - pipeline_version
      - recency_factor
      - timeseries
      - timeseries_metadata
      type: object
    RecommendRequestV1:
      description: |
        Body of `POST /api/v1/drivers`. Mirrors the upstream Recommend service
        contract. Note that the version field is named `version` (not
        `pipeline_version` as on `/forecasts`).

        Required fields: `version`, `recency_factor`, `timeseries_metadata`.
        Both `filters` and `timeseries` are optional on the recommend
        endpoint — when omitted, the handler drops them from the upstream
        payload entirely (no `null` is sent).
      example:
        timeseries:
          key: 6.027456183070403
        recency_factor: 0.08008281904610115
        timeseries_metadata:
          keywords:
          - keywords
          - keywords
          - keywords
          - keywords
          - keywords
          description: description
          title: title
        filters:
          regions:
          - 5961
          - 5961
          limit: 563
          categories:
          - 1466
          - 1466
        version: v1
      properties:
        version:
          description: |
            Recommend pipeline version. Closed set; only v1 is supported today.
            Used **locally** to select the per-version validator and is **not
            forwarded** to the upstream Recommend service.
          enum:
          - v1
          type: string
        recency_factor:
          format: double
          maximum: 1.0
          minimum: 0.0
          type: number
        timeseries_metadata:
          $ref: '#/components/schemas/TimeseriesMetadata'
        filters:
          $ref: '#/components/schemas/Filters'
        timeseries:
          additionalProperties:
            type: number
          description: |
            Optional. Map of YYYY-MM-DD date keys to numeric observation values.
            When supplied, all keys must parse as YYYY-MM-DD and all values must
            be finite. Unlike `/forecasts`, this endpoint is frequency-agnostic
            — there is no monthly alignment, gap detection, or 60-point minimum.
            When omitted, the handler does not forward the field to the upstream
            Recommend service at all.
          type: object
      required:
      - recency_factor
      - timeseries_metadata
      - version
      type: object
    TimeseriesMetadata:
      example:
        keywords:
        - keywords
        - keywords
        - keywords
        - keywords
        - keywords
        description: description
        title: title
      properties:
        title:
          maxLength: 511
          minLength: 20
          type: string
        description:
          maxLength: 2048
          type: string
        keywords:
          items:
            maxLength: 255
            minLength: 1
            type: string
          maxItems: 20
          type: array
      required:
