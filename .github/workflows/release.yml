name: release

# Go modules are consumed via proxy from git tags (vMAJOR.MINOR.PATCH).
# This workflow validates the tree on each semver tag push.

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: go test
        run: go test ./...

      - uses: docker/setup-buildx-action@v3

      - name: verify generated client matches OpenAPI
        run: bash scripts/sdk-verify-go.sh

      - name: GitHub release (notes from CHANGELOG)
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
