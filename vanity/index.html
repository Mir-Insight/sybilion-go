<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Sybilion Go SDK</title>
    <!--
      Go module vanity-import meta tags.
      The Go toolchain fetches https://go.sybilion.dev/sybilion?go-get=1
      and reads these tags to discover where to clone the source from.
      See https://golang.org/cmd/go/#hdr-Remote_import_paths.
    -->
    <meta name="go-import"
          content="go.sybilion.dev/sybilion git https://github.com/Mir-Insight/sybilion-go" />
    <meta name="go-source"
          content="go.sybilion.dev/sybilion https://github.com/Mir-Insight/sybilion-go https://github.com/Mir-Insight/sybilion-go/tree/master{/dir} https://github.com/Mir-Insight/sybilion-go/blob/master{/dir}/{file}#L{line}" />
    <meta http-equiv="refresh"
          content="0; url=https://sybilion.dev/docs/sdk-go" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        max-width: 36rem; margin: 4rem auto; padding: 0 1rem; line-height: 1.55;
      }
      code { background: #f4f4f5; padding: 0.1rem 0.35rem; border-radius: 0.25rem; }
    </style>
  </head>
  <body>
    <h1>Sybilion Go SDK</h1>
    <p>This page resolves the Go module <code>go.sybilion.dev/sybilion</code>. If you got here in a browser, you probably want the documentation:</p>
    <p><a href="https://sybilion.dev/docs/sdk-go">https://sybilion.dev/docs/sdk-go</a></p>
    <pre><code>go get go.sybilion.dev/sybilion@latest</code></pre>
  </body>
</html>
