openapi: 3.0.3
info:
  description: |
    The Sybilion API powers the Sybilion Developers Portal: forecasts, drivers, catalog, account
    and usage. Authenticate every request with `Authorization: Bearer <token>` using either an
    API key created in the Developers Portal or an Auth0 access token from your dashboard session.
  title: Sybilion API
  version: 0.1.0
servers:
- url: /
paths:
  /api/v1/categories:
    get:
      description: |
        Same contract as `/api/v1/regions`, but for **categories**. Full listing,
        no pagination. **Discovery only** — not enforced on forecast or drivers submit.
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CatalogListResponse'
          description: OK
        "401":
          description: Unauthorized
        "502":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
          description: Dimensions backend error or unreachable
        "503":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
          description: Dimensions backend not enabled for this account
      security:
      - bearerAuth: []
      summary: List categories
  /api/v1/drivers:
    post:
      description: |
        Validates the request with the per-version recommend validator and proxies
        it to the upstream Recommend service. The response from the upstream is
        passed through verbatim (status code, body, content type), so any 4xx
        validation error from the upstream is visible to the caller.

        This is a synchronous billed endpoint: charged only on a successful
        upstream response. Cost scales with the number of items returned plus a
        fixed base fee.

        - 402 if the user's available credit balance is below the per-call base
          fee (`base` field of the `drivers` pricing spec). The handler does
          not run and no upstream call is made. (Note: the user-facing balance
          on `GET /api/v1/me` is exposed as `available_eur_cents`; pricing and
          the 402 pre-check are evaluated internally in credits.)
        - On any 2xx, the charge is `rate * len(data.drivers[]) + base`,
          where `data.drivers[]` is the array nested inside the upstream
          Recommend service's envelope
          (`{"status":..,"message":..,"data":{"drivers":[...]}}`). Example
          spec: `{"drivers":{"type":"per_unit","metric":"drivers_items_returned","rate":1,"base":1}}`
          (one credit per returned driver, plus a one-credit base fee). To
          collapse pricing to a flat fee swap the entry for
          `{"drivers":{"type":"flat_fee","credits":1}}`.
        - On any non-2xx (validation 422, upstream 5xx, transport 502), no charge is recorded.
        - Retries with the same `X-Request-ID` are idempotent on the ledger.

        Returns 503 when `RECOMMEND_API_KEY` is not configured.
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RecommendRequestV1'
        required: true
      responses:
        "200":
          description: Ranked candidates from the upstream Recommend service (body
            and content type passed through).
        "400":
          description: Malformed JSON body
        "402":
          description: "Insufficient credits (handler did not run, no upstream call\
            \ was made)"
        "413":
          description: Request body exceeds RECOMMEND_MAX_BODY_BYTES
        "422":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'
          description: Payload failed validation
        "429":
          description: Rate limited (per-user pipeline bucket)
        "502":
          description: Upstream Recommend service transport error
        "503":
          description: Recommend service not configured (RECOMMEND_API_KEY empty)
      security:
      - bearerAuth: []
      summary: Recommend ranked driver-dataset candidates (synchronous proxy)
  /api/v1/forecasts:
    post:
      description: |
        Request body is `ForecastRequestV1`. Optional top-level `filters`, when present,
        may include `categories` and `regions` arrays: **each integer must be between 1 and 9999**
        (inclusive). The API does not verify ids against a catalog. Optional `limit` is
        an integer from **0** to **1000**. See schema `Filters` for the full shape.
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ForecastRequestV1'
        required: true
      responses:
        "202":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/_api_v1_forecasts_post_202_response'
          description: Accepted
        "400":
          description: Malformed JSON body
        "422":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'
          description: Payload failed validation
        "503":
          description: Forecast backend not configured
      security:
      - bearerAuth: []
      summary: Start async forecast job
  /api/v1/forecasts/{id}:
    get:
      parameters:
      - explode: false
        in: path
        name: id
        required: true
        schema:
          format: uuid
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/_api_v1_forecasts__id__get_200_response'
          description: OK
        "404":
          description: "Forecast job not found, not owned by caller, or tombstoned\
            \ by the retention job"
      security:
      - bearerAuth: []
      summary: Poll forecast job status and artifact metadata (downloads via artifacts
        sub-path)
  /api/v1/forecasts/{id}/artifacts/{name}:
    get:
      parameters:
      - explode: false
        in: path
        name: id
        required: true
        schema:
          format: uuid
          type: string
        style: simple
      - explode: false
        in: path
        name: name
        required: true
        schema:
          type: string
        style: simple
      responses:
        "200":
          content:
            application/octet-stream:
              schema:
                format: binary
                type: string
          description: Binary body
        "206":
          description: Partial content (Range)
        "404":
          description: "Forecast job/artifact not found, not owned by caller, or tombstoned\
            \ by the retention job"
      security:
      - bearerAuth: []
      summary: Stream a single output file (proxied from internal artifact store;
        no gs:// URLs)
  /api/v1/jobs:
    get:
      description: |
        Returns the authenticated user's `async_jobs` as a paginated list. Heavy fields
        (`payload`, `artifact_manifest`) are intentionally omitted; fetch full per-job
        state via `GET /api/v1/forecasts/{id}` (only forecast jobs are supported today).

        Only rows that have not been tombstoned by the retention job are returned.
        A tombstoned job (`deleted_at IS NOT NULL`) is excluded here and returns 404
        on the detail endpoint — run `cmd/retention` (see `FORECAST_RETENTION_MAX_AGE`) to
        lifecycle-manage settled jobs.
      parameters:
      - explode: true
        in: query
        name: page
        required: false
        schema:
          default: 1
          minimum: 1
          type: integer
        style: form
      - description: Page size. Capped at 200.
        explode: true
        in: query
        name: limit
        required: false
        schema:
          default: 50
          maximum: 200
          minimum: 1
          type: integer
        style: form
      - explode: true
        in: query
        name: sort
        required: false
        schema:
          default: created_at
          enum:
          - id
          - created_at
          - settled_at
          - eur_cents_final
          type: string
        style: form
      - explode: true
        in: query
        name: order
        required: false
        schema:
          default: desc
          enum:
          - asc
          - desc
          type: string
        style: form
      - description: Optional status filter.
        explode: true
        in: query
        name: status
        required: false
        schema:
          enum:
          - queued
          - running
          - completed
          - failed
          - canceled
          type: string
        style: form
      - description: Optional pipeline type filter (today only "forecast" is emitted).
        explode: true
        in: query
        name: pipeline_type
        required: false
        schema:
          maxLength: 64
          pattern: "^[a-z0-9_-]+$"
          type: string
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/_api_v1_jobs_get_200_response'
          description: OK
        "400":
          description: Invalid query parameter
        "401":
          description: Unauthorized
        "429":
          description: Rate limited (poll bucket)
      security:
      - bearerAuth: []
      summary: Paginated list of the caller's async jobs
  /api/v1/me:
    get:
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MeResponse'
          description: OK
      security:
      - bearerAuth: []
      summary: "Current user, balances, and usage tier"
  /api/v1/regions:
    get:
      description: |
        Returns the full **regions** dimension as JSON with an `items` array. Each item
        includes a numeric `id` plus the fields available for that region.

        **Discovery only:** the API does **not** validate `filters.regions` on
        `POST /api/v1/forecasts` or `POST /api/v1/drivers` against this listing — those
        endpoints keep their existing integer rules (see the `Filters` schema). Use this
        listing to pick valid identifiers for your own integration.

        Requires the same `Authorization: Bearer` as other `/api/v1` routes. Returns
        **503** when the dimensions backend is not enabled for your account.
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CatalogListResponse'
          description: OK
        "401":
          description: Unauthorized
        "502":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
          description: Dimensions backend error or unreachable
        "503":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
          description: Dimensions backend not enabled for this account
      security:
      - bearerAuth: []
      summary: List regions
  /api/v1/tiers:
    get:
      description: |
        Returns the pricing tier ladder, the caller's current `api_usage_tier`, the
        next reachable level (or `null` if already on the highest), and the caller's
        progress toward it.
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TiersResponse'
          description: OK
        "401":
          description: Unauthorized
      security:
      - bearerAuth: []
      summary: "Pricing tier ladder, your current tier, and progress"
  /api/v1/usage:
    get:
      description: |
        Paginated `usage_events` for the authenticated user. Each row is one billing
        charge (async job completion or a synchronous billed call). When present,
        `endpoint` records the API endpoint that produced the charge.

        Pagination is page-based; callers control the sort column and direction via the
        `sort` and `order` query parameters.
      parameters:
      - description: 1-indexed page number.
        explode: true
        in: query
        name: page
        required: false
        schema:
          default: 1
          minimum: 1
          type: integer
        style: form
      - description: Page size. Capped at 200.
        explode: true
        in: query
        name: limit
        required: false
        schema:
          default: 50
          maximum: 200
          minimum: 1
          type: integer
        style: form
      - description: Column to sort by.
        explode: true
        in: query
        name: sort
        required: false
        schema:
          default: id
          enum:
          - id
          - created_at
          - eur_cents_charged
          - credits_charged
          - units
          type: string
        style: form
      - description: Sort direction.
        explode: true
        in: query
        name: order
        required: false
        schema:
          default: desc
          enum:
          - asc
          - desc
          type: string
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/_api_v1_usage_get_200_response'
          description: OK
        "400":
          description: Invalid query parameter (bad page/limit/sort/order)
        "401":
          description: Unauthorized
      security:
      - bearerAuth: []
      summary: Paginated usage (charged tasks)
  /health:
    get:
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
          description: All components healthy (no component in `error`)
        "503":
          content:
            application/json:
              schema:
                type: object
          description: Degraded — at least one component is in `error`
      summary: Health check
components:
  schemas:
    AutoRechargePatch:
      properties:
        below_eur_cents:
          description: Trigger threshold in EUR cents (>= 1 when enabled).
          format: int64
          type: integer
        enabled:
          type: boolean
        monthly_cap_cents:
          format: int64
          type: integer
        target_eur_cents:
          description: Target balance in EUR cents (> below_eur_cents when enabled).
          format: int64
          type: integer
      required:
      - below_eur_cents
      - enabled
      - monthly_cap_cents
      - target_eur_cents
      type: object
    AutoRechargeState:
      example:
        meter_month: 2000-01-23
        has_stripe_customer: true
        below_eur_cents: 6
        meter_cents: 1
        monthly_cap_cents: 5
        enabled: true
        target_eur_cents: 5
      properties:
        below_eur_cents:
          description: "When the available balance drops below this many EUR cents,\
            \ recharge fires."
          format: int64
          type: integer
        enabled:
          type: boolean
        has_stripe_customer:
          description: Whether a Stripe customer id is stored (required for auto-recharge
            to run)
          type: boolean
        meter_cents:
          format: int64
          type: integer
        meter_month:
          description: "UTC month start for meter_cents, if any charges recorded this\
            \ month"
          format: date
          nullable: true
          type: string
        monthly_cap_cents:
          description: EUR cents charged via auto-recharge per UTC calendar month;
            0 = no cap
          format: int64
          type: integer
        target_eur_cents:
          description: "Target balance to reach after a recharge, in EUR cents."
          format: int64
          type: integer
      required:
      - below_eur_cents
      - enabled
      - has_stripe_customer
      - meter_cents
      - monthly_cap_cents
      - target_eur_cents
      type: object
    CatalogListResponse:
      example:
        items:
        - key: ""
        - key: ""
      properties:
        items:
          description: |
            All regions or categories, sorted by numeric `id` ascending. Each element
            is an object with at least `id` (integer) plus the fields available for
            that dimension.
          items:
            additionalProperties: true
            type: object
          type: array
      required:
      - items
      type: object
    CheckoutRequest:
      properties:
        amount_cents:
          description: Min 500 (€5.00) by default; server-enforced
          format: int64
          type: integer
        currency:
          default: eur
          type: string
      type: object
    ErrorMessage:
      example:
        error: error
      properties:
        error:
          description: Human-readable message (e.g. `angler catalog not configured`).
          type: string
      required:
      - error
      type: object
    EuroTranche:
      example:
        remaining_eur_cents: 3
        expires_at: 2000-01-23T04:56:07.000+00:00
        created_at: 2000-01-23T04:56:07.000+00:00
        id: 046b6c7f-0b8a-43b9-b35d-6489e6daee91
        source: source
        initial_eur_cents: 9
      properties:
        created_at:
          format: date-time
          type: string
        expires_at:
          format: date-time
          type: string
        id:
          format: uuid
          type: string
        initial_eur_cents:
          format: int64
          type: integer
        remaining_eur_cents:
          format: int64
          type: integer
        source:
          description: "One of signup_trial, stripe, partner, legacy. Other labels\
            \ may appear for custom grants."
          type: string
      required:
      - created_at
      - expires_at
      - id
      - initial_eur_cents
      - remaining_eur_cents
      - source
      type: object
    Filters:
      description: |
        Optional narrowing for forecast and drivers requests. Integer ids must fall in
        **1..9999**.

        **Discovery:** `GET /api/v1/regions` and `GET /api/v1/categories` return the
        available dimension listings so you can choose ids — submitted filter ids are
        not cross-checked against those listings on `POST /forecasts` or `POST /drivers`.
      properties:
        categories:
          description: Dimension ids; each item must be an integer from **1** through
            **9999** inclusive.
          items:
            maximum: 9999
            minimum: 1
            type: integer
          type: array
        limit:
          maximum: 1000
          minimum: 0
          type: integer
        regions:
          description: Dimension ids; each item must be an integer from **1** through
            **9999** inclusive.
          items:
            maximum: 9999
            minimum: 1
            type: integer
          type: array
      type: object
    ForecastArtifactMeta:
      example:
        content_type: content_type
        size: 0
        name: name
        href: href
      properties:
        content_type:
          type: string
        href:
          type: string
        name:
          type: string
        size:
          format: int64
          type: integer
      type: object
    ForecastRequestV1:
      description: |
        Body of `POST /api/v1/forecasts`. Optional **`filters`**: when present, each
        **`categories[]`** and **`regions[]`** value is an integer **1–9999** inclusive;
        optional **`limit`** is **0–1000**. See component **`Filters`** for the full schema.
      example:
        backtest: true
        pipeline_version: v1
        horizon: 1
        timeseries:
          key: 1.4658129805029452
        recency_factor: 0.6027456183070403
        timeseries_metadata:
          keywords:
          - keywords
          - keywords
          - keywords
          - keywords
          - keywords
          description: description
          title: title
        strictly_positive: false
        filters: ""
        frequency: monthly
      properties:
        backtest:
          description: "When true, run a backtest evaluation alongside the forecast."
          type: boolean
        filters:
          allOf:
          - $ref: '#/components/schemas/Filters'
          description: |
            Optional. Each **`categories[]`** and **`regions[]`** entry must be an integer **1–9999**
            (inclusive). Optional **`limit`** is **0–1000**. Values are not verified against catalog APIs.
        frequency:
          description: Series cadence. Only "monthly" is currently supported; "daily"
            and "weekly" are reserved.
          enum:
          - monthly
          type: string
        horizon:
          description: Number of forecast steps to produce.
          maximum: 12
          minimum: 1
          type: integer
        pipeline_version:
          description: Pipeline version. Closed set; no aliases or "latest" resolution.
            Only v1 is supported today.
          enum:
          - v1
          type: string
        recency_factor:
          format: double
          maximum: 1
          minimum: 0
          type: number
        strictly_positive:
          default: false
          description: |
            When true, every value in `timeseries` must be `>= 0` (zero is
            allowed); a single negative observation rejects the request
            with 422. The downstream forecasting pipeline (PPL) also clamps
            the produced forecast at zero so no output point can be
            negative. Defaults to false, in which case no positivity
            constraint is applied to inputs or outputs and negative values
            are returned unchanged. Optional.
          type: boolean
        timeseries:
          additionalProperties:
            type: number
          description: Map of YYYY-MM-DD date keys to numeric observation values.
            Must contain at least 60 points (5 years of monthly history) and be aligned
            to the declared frequency.
          type: object
        timeseries_metadata:
          $ref: '#/components/schemas/TimeseriesMetadata'
      required:
      - frequency
      - horizon
      - pipeline_version
      - recency_factor
      - timeseries
      - timeseries_metadata
      type: object
    JobSummary:
      description: "Lightweight projection of an async_jobs row (no payload, no manifest)."
      example:
        eur_cents_final: 0
        terminal_reason: terminal_reason
        workflow_id: workflow_id
        run_id: run_id
        job_id: 046b6c7f-0b8a-43b9-b35d-6489e6daee91
        settled: true
        created_at: 2000-01-23T04:56:07.000+00:00
        settled_at: 2000-01-23T04:56:07.000+00:00
        pipeline_type: pipeline_type
        status: queued
      properties:
        created_at:
          format: date-time
          type: string
        eur_cents_final:
          description: "Final settled charge for the job, in EUR cents. Null until\
            \ settled."
          format: int64
          nullable: true
          type: integer
        job_id:
          format: uuid
          type: string
        pipeline_type:
          description: Today only "forecast"; future pipeline types will appear here.
          type: string
        run_id:
          description: Internal run id (omitted for jobs that haven't started yet).
          type: string
        settled:
          description: True iff the job has reached a terminal state and been billed.
          type: boolean
        settled_at:
          format: date-time
          nullable: true
          type: string
        status:
          enum:
          - queued
          - running
          - completed
          - failed
          - canceled
          type: string
        terminal_reason:
          nullable: true
          type: string
        workflow_id:
          description: Internal workflow id (omitted for jobs that haven't started
            yet).
          type: string
      required:
      - created_at
      - job_id
      - pipeline_type
      - settled
      - status
      type: object
    JobsPagination:
      example:
        total: 0
        limit: 120
        page: 1
        sort: id
        total_pages: 0
        order: asc
      properties:
        limit:
          maximum: 200
          minimum: 1
          type: integer
        order:
          enum:
          - asc
          - desc
          type: string
        page:
          minimum: 1
          type: integer
        sort:
          enum:
          - id
          - created_at
          - settled_at
          - eur_cents_final
          type: string
        total:
          format: int64
          minimum: 0
          type: integer
        total_pages:
          format: int64
          minimum: 0
          type: integer
      required:
      - limit
      - order
      - page
      - sort
      - total
      - total_pages
      type: object
    MeResponse:
      description: |
        Authenticated user snapshot. All monetary fields are integer EUR cents
        (1 EUR = 100 cents).
      example:
        api_usage_tier: 0
        auto_recharge:
          meter_month: 2000-01-23
          has_stripe_customer: true
          below_eur_cents: 6
          meter_cents: 1
          monthly_cap_cents: 5
          enabled: true
          target_eur_cents: 5
        payment_count: 4
        lifetime_paid_cents: 2
        available_eur_cents: 2
        user_id: 046b6c7f-0b8a-43b9-b35d-6489e6daee91
        has_ever_paid: true
        euro_tranches:
        - remaining_eur_cents: 3
          expires_at: 2000-01-23T04:56:07.000+00:00
          created_at: 2000-01-23T04:56:07.000+00:00
          id: 046b6c7f-0b8a-43b9-b35d-6489e6daee91
          source: source
          initial_eur_cents: 9
        - remaining_eur_cents: 3
          expires_at: 2000-01-23T04:56:07.000+00:00
          created_at: 2000-01-23T04:56:07.000+00:00
          id: 046b6c7f-0b8a-43b9-b35d-6489e6daee91
          source: source
          initial_eur_cents: 9
        signup_trial:
          granted_at: 2000-01-23T04:56:07.000+00:00
          remaining_eur_cents: 1
          expires_at: 2000-01-23T04:56:07.000+00:00
          initial_eur_cents: 7
        balance_eur_cents: 7
      properties:
        api_usage_tier:
          type: integer
        auto_recharge:
          $ref: '#/components/schemas/AutoRechargeState'
        available_eur_cents:
          description: balance_eur_cents minus active holds for in-flight async jobs.
          format: int64
          type: integer
        balance_eur_cents:
          description: Ledger sum exposed as EUR cents.
          format: int64
          type: integer
        euro_tranches:
          description: "Active grants (non-empty, unexpired). Consumed in expires_at\
            \ ascending order."
          items:
            $ref: '#/components/schemas/EuroTranche'
          type: array
        has_ever_paid:
          type: boolean
        lifetime_paid_cents:
          format: int64
          type: integer
        payment_count:
          type: integer
        signup_trial:
          $ref: '#/components/schemas/MeResponse_signup_trial'
        user_id:
          format: uuid
          type: string
      required:
      - api_usage_tier
      - available_eur_cents
      - balance_eur_cents
      - euro_tranches
      - has_ever_paid
      - lifetime_paid_cents
      - payment_count
      - user_id
      type: object
    Pagination:
      example:
        total: 0
        limit: 16
        page: 1
        sort: id
        total_pages: 0
        order: asc
      properties:
        limit:
          description: Page size echoed back from the request.
          maximum: 200
          minimum: 1
          type: integer
        order:
          description: Sort direction.
          enum:
          - asc
          - desc
          type: string
        page:
          description: 1-indexed current page number echoed back from the request.
          minimum: 1
          type: integer
        sort:
          description: Column the rows are sorted by.
          enum:
          - id
          - created_at
          - eur_cents_charged
          - credits_charged
          - units
          type: string
        total:
          description: "Total matching rows for the authenticated user (full set,\
            \ not just this page)."
          format: int64
          minimum: 0
          type: integer
        total_pages:
          description: ceil(total / limit). Zero when total is zero.
          format: int64
          minimum: 0
          type: integer
      required:
      - limit
      - order
      - page
      - sort
      - total
      - total_pages
      type: object
    RecommendRequestV1:
      description: |
        Body of `POST /api/v1/drivers`. Mirrors the upstream Recommend service
        contract. Note that the version field is named `version` (not
        `pipeline_version` as on `/forecasts`).

        Required fields: `version`, `recency_factor`, `timeseries_metadata`.
        Both `filters` and `timeseries` are optional on the recommend
        endpoint — when omitted, the handler drops them from the upstream
        payload entirely (no `null` is sent).

        When `filters` is present, **`categories[]`** and **`regions[]`** follow the same rules as
        `POST /api/v1/forecasts`: each integer must be **1–9999** inclusive; optional **`limit`** is **0–1000**.
        See schema **`Filters`** for the canonical shape.
      example:
        timeseries:
          key: 6.027456183070403
        recency_factor: 0.08008281904610115
        timeseries_metadata:
          keywords:
          - keywords
          - keywords
          - keywords
          - keywords
          - keywords
          description: description
          title: title
        filters: ""
        version: v1
      properties:
        filters:
          allOf:
          - $ref: '#/components/schemas/Filters'
          description: |
            Optional. Same validation as **`POST /api/v1/forecasts`**: each **`categories[]`** and
            **`regions[]`** entry is an integer **1–9999** (inclusive); optional **`limit`** is **0–1000**.
            Values are not verified against catalog APIs.
        recency_factor:
          format: double
          maximum: 1
          minimum: 0
          type: number
        timeseries:
          additionalProperties:
            type: number
          description: |
            Optional. Map of YYYY-MM-DD date keys to numeric observation values.
            When supplied, all keys must parse as YYYY-MM-DD and all values must
            be finite. Unlike `/forecasts`, this endpoint is frequency-agnostic
            — there is no monthly alignment, gap detection, or 60-point minimum.
            When omitted, the handler does not forward the field to the upstream
            Recommend service at all.
          type: object
        timeseries_metadata:
          $ref: '#/components/schemas/TimeseriesMetadata'
        version:
          description: |
            Recommend pipeline version. Closed set; only v1 is supported today.
            Used **locally** to select the per-version validator and is **not
            forwarded** to the upstream Recommend service.
          enum:
          - v1
          type: string
      required:
      - recency_factor
      - timeseries_metadata
      - version
      type: object
    TierConfig:
      example:
        sync_billed_rpm: 7
        level: 7
        min_single_payment_cents: 4
        min_lifetime_paid_cents: 3
        max_concurrent_jobs: 9
        min_payment_count: 2
        general_rpm: 2
      properties:
        general_rpm:
          description: Per-minute cap on general authenticated /api/v1/* requests
            at this tier.
          type: integer
        level:
          description: Tier level identifier (0 is the baseline).
          type: integer
        max_concurrent_jobs:
          description: Maximum in-flight async forecast jobs (queued + running) at
            this tier.
          type: integer
        min_lifetime_paid_cents:
          description: Minimum lifetime payment in EUR cents to reach this tier.
          format: int64
          type: integer
        min_payment_count:
          description: Minimum number of successful payments to reach this tier.
          type: integer
        min_single_payment_cents:
          description: Minimum single payment in EUR cents to reach this tier; 0 means
            no constraint.
          format: int64
          type: integer
        sync_billed_rpm:
          description: Per-minute cap on synchronous billed endpoints (e.g. POST /drivers)
            at this tier.
          type: integer
      required:
      - general_rpm
      - level
      - max_concurrent_jobs
      - min_lifetime_paid_cents
      - min_payment_count
      - min_single_payment_cents
      - sync_billed_rpm
      type: object
    TiersResponse:
      example:
        tiers:
        - sync_billed_rpm: 7
          level: 7
          min_single_payment_cents: 4
          min_lifetime_paid_cents: 3
          max_concurrent_jobs: 9
          min_payment_count: 2
          general_rpm: 2
        - sync_billed_rpm: 7
          level: 7
          min_single_payment_cents: 4
          min_lifetime_paid_cents: 3
          max_concurrent_jobs: 9
          min_payment_count: 2
          general_rpm: 2
        next_tier: 6
        current_tier: 0
        progress:
          payment_count: 5
          lifetime_paid_cents: 1
          max_single_payment_cents: 5
      properties:
        current_tier:
          description: The caller's current api_usage_tier.
          type: integer
        next_tier:
          description: "Lowest level greater than current_tier in the ladder, or null\
            \ when already at the top."
          nullable: true
          type: integer
        progress:
          $ref: '#/components/schemas/TiersResponse_progress'
        tiers:
          description: "Pricing tier ladder, sorted ascending by level."
          items:
            $ref: '#/components/schemas/TierConfig'
          type: array
      required:
      - current_tier
      - next_tier
      - progress
      - tiers
      type: object
    TimeseriesMetadata:
      example:
        keywords:
        - keywords
        - keywords
        - keywords
        - keywords
        - keywords
        description: description
        title: title
      properties:
        description:
          maxLength: 2048
          type: string
        keywords:
          items:
            maxLength: 255
            minLength: 1
            type: string
          maxItems: 20
          type: array
        title:
          maxLength: 511
          minLength: 20
          type: string
      required:
      - title
      type: object
    UsageEvent:
      example:
        endpoint: endpoint
        eur_cents_charged: 2
        credits_charged: 5
        created_at: created_at
        async_job_id: 046b6c7f-0b8a-43b9-b35d-6489e6daee91
        id: 7
        units: 9
      properties:
        async_job_id:
          description: async_jobs.id (UUID) for async pipeline charges; null for sync
            endpoint charges
          format: uuid
          nullable: true
          type: string
        created_at:
          description: Timestamp (ISO-8601 text from the database)
          type: string
        credits_charged:
          description: Whole credits debited for this usage row before EUR conversion
            (`eur_cents_charged`).
          format: int64
          type: integer
        endpoint:
          description: Billing endpoint key (e.g. forecast pipeline type or sync route
            key)
          type: string
        eur_cents_charged:
          description: EUR cents debited for this usage row (1 EUR = 100 cents).
          format: int64
          type: integer
        id:
          format: int64
          type: integer
        units:
          description: "Strategy-defined metering quantity (e.g. tokens, seconds);\
            \ not necessarily equal to credits."
          format: int64
          type: integer
      required:
      - created_at
      - credits_charged
      - eur_cents_charged
      - id
      - units
      type: object
    ValidationErrorResponse:
